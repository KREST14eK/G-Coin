<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-COIN — Ball system</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #f1f5f9;
            --accent: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 10;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 12px; top: 12px; color: #94a3b8; font-size: 14px; }
        
        input, textarea {
            width: 100%;
            padding: 10px 10px 10px 35px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: rgba(15, 23, 42, 0.9); }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }

        .panel-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        .panel-title {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-card {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .balance-amount { font-size: 32px; font-weight: 800; }

        .history-box {
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 12px;
        }
        .trans-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        /* Стили для модального окна на весь экран */
        .modal-full {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .modal-full.active { display: flex; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { background: rgba(99, 102, 241, 0.2); color: var(--primary); font-size: 12px; text-transform: uppercase; }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .fab-request {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .side-drawer {
            position: fixed;
            top: 0; right: -350px; width: 300px; height: 100%;
            background: #1e293b; border-left: 1px solid rgba(255,255,255,0.1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 1001;
            transition: 0.4s ease; padding: 30px; display: flex; flex-direction: column;
        }
        .side-drawer.open { right: 0; }
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1000; backdrop-filter: blur(4px);
        }

        .admin-req-item {
            background: #2b303b; border-radius: 12px; padding: 12px; border-left: 4px solid var(--primary);
            position: relative; margin-bottom: 10px; padding-right: 45px;
        }
        .btn-del-small {
            position: absolute; top: 6px; right: 6px; width: 35px; height: 18px;
            background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 4px; font-size: 8px; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="admin-modal" class="modal-full">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="modal-title" style="margin:0; color: var(--primary);">Управление</h2>
        <button onclick="closeAdminModal()" style="width: auto; background: #334155;">Закрыть ✕</button>
    </div>
    
    <div style="flex-grow: 1; overflow-y: auto;">
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Причина</th>
                    <th>Штраф</th>
                    <th>Пополнение</th>
                </tr>
            </thead>
            <tbody id="modal-table-body"></tbody>
        </table>
    </div>

    <div class="panel-section" style="background: rgba(15, 23, 42, 0.8); margin-top: 10px;">
        <div class="panel-title"><i class="fas fa-coins"></i> Новая операция</div>
        <div class="input-group"><i class="fas fa-comment-alt"></i><input type="text" id="op-reason" placeholder="Причина (сообщение к переводу)"></div>
        <div class="input-group"><i class="fas fa-money-bill-wave"></i><input type="number" id="op-amount" placeholder="Сумма перевода"></div>
        <div class="btn-grid">
            <button style="background: var(--success);" onclick="processOp('plus')">Пополнить</button>
            <button style="background: var(--accent);" onclick="processOp('minus')">Штраф</button>
        </div>
    </div>
</div>

<div id="drawer-overlay" class="drawer-overlay" onclick="toggleDrawer()"></div>

<div id="fab-btn" class="fab-request" onclick="toggleDrawer()">
    <i class="fas fa-comment-dots"></i>
</div>

<div id="side-drawer" class="side-drawer">
    <h3 style="margin: 0 0 10px 0; color: var(--primary);">Новый запрос</h3>
    <textarea id="request-text" style="height: 150px; padding: 12px 15px; margin-bottom: 15px;" placeholder="Сообщение для Макса"></textarea>
    <button onclick="sendRequestToServer()">Отправить запрос</button>
    <button onclick="toggleDrawer()" style="background: transparent; border: 1px solid #475569;">Отмена</button>
</div>

<div class="container">
    <div id="login-screen" class="screen active">
        <div style="max-width: 320px; margin: 0 auto; text-align: center;">
            <i class="fas fa-shield-halved" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin: 0 0 25px 0;">G-COIN</h2>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="login-input" placeholder="Логин"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="pass-input" placeholder="Пароль"></div>
            <button onclick="auth()">Войти в систему</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="font-weight: bold; font-size: 18px;">
                <i class="fas fa-user-circle"></i> <span id="user-name"></span>
            </div>
            <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #334155; margin:0;">
                <i class="fas fa-sign-out-alt"></i> Выход
            </button>
        </div>

        <div class="dashboard">
            <div class="left-col">
                <div class="balance-card">
                    <div style="font-size: 11px; opacity: 0.8; letter-spacing: 1px; text-transform: uppercase;">Мой счет</div>
                    <div class="balance-amount"><span id="balance-val">0</span> Б</div>
                </div>
                <div class="history-box" id="history-box">
                    <div class="panel-title"><i class="fas fa-list-ul"></i> Операции</div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel-section">
                    <div class="panel-title"><i class="fas fa-paper-plane"></i> Быстрый перевод</div>
                    <div class="input-group"><i class="fas fa-at"></i><input type="text" id="target-user" placeholder="Логин получателя"></div>
                    <div class="input-group"><i class="fas fa-coins"></i><input type="number" id="amount-input" placeholder="Сумма"></div>
                    <button style="background: var(--success);" onclick="sendMoney()">Отправить средства</button>
                </div>

                <div id="admin-panel" class="panel-section" style="border-color: var(--accent); display:none;">
                    <div class="panel-title" style="color: var(--accent);"><i class="fas fa-user-shield"></i> Управление пользователями</div>
                    <button style="background: #818cf8; margin-bottom: 10px;" onclick="openAdminModal('svyat')">Управление: СВЯТ</button>
                    <button style="background: #a78bfa;" onclick="openAdminModal('misha')">Управление: МИША</button>
                </div>

                <div id="admin-req-section" class="panel-section" style="display:none;">
                    <div class="panel-title" style="color: #8a8dff;"><i class="fas fa-envelope-open-text"></i> Запросы</div>
                    <div id="admin-requests-container"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBExRrPLJEI-oWgOEcZ2WLn04EGLduGJSc",
        authDomain: "mycloudlybank.firebaseapp.com",
        databaseURL: "https://mycloudlybank-default-rtdb.firebaseio.com",
        projectId: "mycloudlybank",
        storageBucket: "mycloudlybank.firebasestorage.app",
        messagingSenderId: "482067969296",
        appId: "1:482067969296:web:0bcb8305693cac9dfc2195"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentLogin = null;
    let targetAdminUser = null; // Тот, кого сейчас редактирует админ

    const admins = ['maxS', 'maxA'];
    function checkAdmin(user) { return admins.includes(user); }

    window.onload = function() {
        const savedLogin = localStorage.getItem('gcoin_login');
        const savedPass = localStorage.getItem('gcoin_pass');
        if (savedLogin && savedPass) {
            document.getElementById('login-input').value = savedLogin;
            document.getElementById('pass-input').value = savedPass;
            auth(true);
        }
    };

    function auth(isAuto = false) {
        const login = document.getElementById('login-input').value.trim();
        const pass = document.getElementById('pass-input').value;
        if (!login || !pass) return alert("Введите логин и пароль");

        db.ref('users/' + login).once('value', (snap) => {
            if (snap.exists()) {
                if (snap.val().password === pass) {
                    localStorage.setItem('gcoin_login', login);
                    localStorage.setItem('gcoin_pass', pass);
                    goMain(login);
                } else if(!isAuto) alert("Неверный пароль");
            } else {
                db.ref('users/' + login).set({ password: pass, balance: 0 }).then(() => {
                    localStorage.setItem('gcoin_login', login);
                    localStorage.setItem('gcoin_pass', pass);
                    goMain(login);
                });
            }
        });
    }

    function logout() {
        localStorage.removeItem('gcoin_login');
        localStorage.removeItem('gcoin_pass');
        location.reload();
    }

    function goMain(login) {
        currentLogin = login;
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        document.getElementById('user-name').innerText = login;
        document.getElementById('fab-btn').style.display = 'flex';

        if (checkAdmin(login)) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-req-section').style.display = 'block';
            initAdminRequests();
        }

        db.ref('users/' + login + '/balance').on('value', (s) => {
            document.getElementById('balance-val').innerText = s.val() || 0;
        });

        db.ref('history').on('value', (snap) => {
            const box = document.getElementById('history-box');
            box.innerHTML = '<div class="panel-title"><i class="fas fa-list-ul"></i> Операции</div>';
            const data = [];
            snap.forEach(c => { if(c.val().from === login || c.val().to === login) data.push(c.val()); });
            data.reverse().slice(0,10).forEach(d => {
                const isOut = d.from === login;
                box.innerHTML += `
                    <div class="trans-item">
                        <span style="color:${isOut?'#f87171':'#4ade80'}; font-weight:bold;">${isOut?'-':'+'} ${d.amount} Б</span>
                        <div style="font-size:11px; opacity:0.6;">${d.reason || (isOut?'Кому: '+d.to : 'От: '+d.from)}</div>
                    </div>`;
            });
        });
    }

    // --- НОВАЯ ЛОГИКА АДМИН-ПАНЕЛИ ---

    function openAdminModal(user) {
        targetAdminUser = user;
        document.getElementById('modal-title').innerText = "Управление: " + user.toUpperCase();
        document.getElementById('admin-modal').classList.add('active');
        
        // Загрузка истории именно этого пользователя в таблицу
        db.ref('history').on('value', (snap) => {
            const tbody = document.getElementById('modal-table-body');
            tbody.innerHTML = '';
            const history = [];
            snap.forEach(child => {
                const d = child.val();
                if (d.from === user || d.to === user) history.push(d);
            });
            
            history.reverse().forEach(d => {
                const isPlus = d.to === user;
                const date = d.timestamp ? new Date(d.timestamp).toLocaleDateString() : '---';
                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:11px; opacity:0.6;">${date}</td>
                        <td>${d.reason || 'Без причины'}</td>
                        <td style="color:#ef4444">${!isPlus ? d.amount + ' Б' : ''}</td>
                        <td style="color:#22c55e">${isPlus ? d.amount + ' Б' : ''}</td>
                    </tr>
                `;
            });
        });
    }

    function closeAdminModal() {
        document.getElementById('admin-modal').classList.remove('active');
        db.ref('history').off(); // Отключаем прослушку, чтобы не тратить ресурс
    }

    function processOp(type) {
        const amount = parseInt(document.getElementById('op-amount').value);
        const reason = document.getElementById('op-reason').value.trim();
        
        if (!amount || amount <= 0 || !reason) return alert("Введите сумму и причину!");

        const finalAmount = type === 'plus' ? amount : -amount;

        db.ref('users/' + targetAdminUser + '/balance').transaction(curr => (curr || 0) + finalAmount);
        
        // Записываем в историю
        db.ref('history').push({
            from: type === 'plus' ? "Центробанк" : targetAdminUser,
            to: type === 'plus' ? targetAdminUser : "Штраф",
            amount: amount,
            reason: reason,
            timestamp: Date.now()
        });

        alert("Выполнено!");
        document.getElementById('op-amount').value = '';
        document.getElementById('op-reason').value = '';
    }

    // --- ОСТАЛЬНЫЕ ФУНКЦИИ ---

    function toggleDrawer() {
        const dr = document.getElementById('side-drawer');
        const ov = document.getElementById('drawer-overlay');
        dr.classList.toggle('open');
        ov.style.display = dr.classList.contains('open') ? 'block' : 'none';
    }

    function sendRequestToServer() {
        const txt = document.getElementById('request-text').value.trim();
        if (!txt) return;
        db.ref('requests').push({ from: currentLogin, text: txt, timestamp: Date.now() });
        alert("Отправлено!");
        document.getElementById('request-text').value = '';
        toggleDrawer();
    }

    function initAdminRequests() {
        db.ref('requests').on('value', (snap) => {
            const container = document.getElementById('admin-requests-container');
            container.innerHTML = '';
            Object.entries(snap.val() || {}).reverse().forEach(([id, r]) => {
                container.innerHTML += `
                    <div class="admin-req-item">
                        <span style="font-size:10px; color:var(--primary)">${r.from}</span><br>${r.text}
                        <button class="btn-del-small" onclick="db.ref('requests/${id}').remove()">DEL</button>
                    </div>`;
            });
        });
    }

    function sendMoney() {
        const target = document.getElementById('target-user').value.trim();
        const amount = parseInt(document.getElementById('amount-input').value);
        if (!target || !amount || amount <= 0) return alert("Ошибка данных");

        db.ref('users/' + target).once('value', (tsnap) => {
            if (!tsnap.exists()) return alert("Нет такого юзера");
            db.ref('users/' + currentLogin + '/balance').once('value', (msnap) => {
                const myB = msnap.val() || 0;
                if (myB < amount) return alert("Мало баллов");
                db.ref('users/' + currentLogin + '/balance').set(myB - amount);
                db.ref('users/' + target + '/balance').transaction(b => (b || 0) + amount);
                db.ref('history').push({ from: currentLogin, to: target, amount: amount, timestamp: Date.now() });
                alert("Переведено!");
            });
        });
    }
</script>
</body>
</html>
